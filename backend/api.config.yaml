# Sample API: campus fruit trees and bushes
# Copy this file to the project root as api.config.yaml (backup the default first if you want).

resources:
  - type: Personality
    path: /personalities
    operations: [list, retrieve, create, update, delete]
    fields:
      - name: name
        type: string
        required: true
        query: true
      - name: description
        type: text
    permissions:
      list: public
      retrieve: public
      create: user
      update: owner
      delete: owner
  - type: Anime
    path: /animes
    operations: [list, retrieve, create, update, delete]
    fields:
      - name: title
        type: string
        required: true
        query: true
      - name: genre
        type: string
        query: true
      - name: release_year
        type: integer
    permissions:
      list: public
      retrieve: public
      create: user
      update: owner
      delete: owner
  - type: Character
    path: /characters
    operations: [list, retrieve, create, update, delete]
    fields:
      - name: name
        type: string
        required: true
        query: true
      - name: image_url
        type: image_url
        query: true
      - name: anime
        type: Anime
        required: true
        query: true
      - name: personality
        type: Personality
        required: true
        query: true
      - name: description
        type: text
      - name: age
        type: integer
    permissions:
      list: public
      retrieve: public
      create: user
      update: owner
      delete: owner
Query: true

